<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Quiz & Tasks</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.container{
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h2{
margin-bottom:10px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.option{
background:white;
color:black;
}

.option:hover{
background:#f0f0f0;
}

.next{
background:#ffd54f;
}

.task{
background:#4caf50;
color:white;
}

.score{
margin-top:15px;
font-size:18px;
}

.task-box{
margin-top:20px;
font-size:16px;
background:rgba(255,255,255,0.2);
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>🧠 Daily Quiz</h2>

<p id="question">Question loading...</p>

<div id="answers"></div>

<button class="next" onclick="nextQuestion()">Next Question</button>

<div class="score">
Score: <span id="score">0</span>
</div>

<h2 style="margin-top:25px;">🎯 Daily Task</h2>

<button class="task" onclick="generateTask()">Get Task</button>

<div class="task-box" id="task">
Your task will appear here
</div>

</div>

<script>

const quiz=[

{
q:"What does HTML stand for?",
a:["Hyper Text Markup Language","High Text Machine Language","Hyper Tool Multi Language","None"],
correct:0
},

{
q:"Which language styles websites?",
a:["HTML","CSS","Python","C++"],
correct:1
},

{
q:"Which language runs in the browser?",
a:["Java","C","JavaScript","Python"],
correct:2
},

{
q:"What does CPU stand for?",
a:["Central Processing Unit","Computer Personal Unit","Central Print Unit","Control Unit"],
correct:0
},

{
q:"Which company developed JavaScript?",
a:["Google","Netscape","Apple","IBM"],
correct:1
}

];

const tasks=[

"Write one goal for today.",
"Learn one new JavaScript concept.",
"Read 5 pages of a book.",
"Practice typing for 5 minutes.",
"Think of one startup idea.",
"Write a small HTML webpage.",
"Explain the internet in simple words.",
"Help someone today.",
"Learn 3 new English words.",
"Organize your computer files."

];

let current;
let score=0;

function loadQuestion(){

current=Math.floor(Math.random()*quiz.length);

document.getElementById("question").innerText=quiz[current].q;

let answersHTML="";

quiz[current].a.forEach((option,index)=>{

answersHTML+=`<button class="option" onclick="checkAnswer(${index})">${option}</button>`;

});

document.getElementById("answers").innerHTML=answersHTML;

}

function checkAnswer(index){

if(index===quiz[current].correct){

score++;
document.getElementById("score").innerText=score;
alert("Correct 🎉");

}else{

alert("Wrong ❌");

}

}

function nextQuestion(){
loadQuestion();
}

function generateTask(){

const random=Math.floor(Math.random()*tasks.length);

document.getElementById("task").innerText=tasks[random];

}

loadQuestion();

</script>

</body>
</html>
